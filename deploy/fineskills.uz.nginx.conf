# /etc/nginx/sites-available/fineskills.uz
#
# VM host nginx config — HTTPS termination for fineskills.uz, reverse-proxies
# to the Docker container exposed on 127.0.0.1:4300.
#
# Install on VM:
#   sudo cp deploy/fineskills.uz.nginx.conf /etc/nginx/sites-available/fineskills.uz
#   sudo ln -sf /etc/nginx/sites-available/fineskills.uz /etc/nginx/sites-enabled/fineskills.uz
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue TLS cert (Let's Encrypt):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d fineskills.uz -d www.fineskills.uz
#   # certbot will auto-edit the listen 443 block below and add managed lines.

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name fineskills.uz www.fineskills.uz;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- www → apex redirect (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fineskills.uz;

    # certbot will fill these in
    # ssl_certificate     /etc/letsencrypt/live/fineskills.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fineskills.uz/privkey.pem;

    return 301 https://fineskills.uz$request_uri;
}

# --- Main HTTPS server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fineskills.uz;

    # certbot will fill these in
    # ssl_certificate     /etc/letsencrypt/live/fineskills.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fineskills.uz/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase if you ever upload assets through this domain
    client_max_body_size 20m;

    # HSTS (turn on once you've verified HTTPS works end-to-end)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/fineskills.uz.access.log;
    error_log  /var/log/nginx/fineskills.uz.error.log;

    location / {
        proxy_pass http://127.0.0.1:4300;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 15s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Allow WebSocket upgrade in case anything needs it
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
